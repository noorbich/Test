<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargantua - Interstellar Black Hole</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #fff;
        }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            pointer-events: none;
            user-select: none;
        }
        #info h1 { margin: 0; font-size: 18px; font-weight: 300; letter-spacing: 2px; }
        #info p { margin: 5px 0 0; font-size: 12px; opacity: 0.7; font-weight: 300; }
    </style>
</head>
<body>
    <div id="info">
        <h1>GARGANTUA</h1>
        <p>Drag to orbit. Scroll to zoom.</p>
    </div>

    <!-- Import Map for Three.js ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- SCENE & RENDERER SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, -18); // Start slightly above and behind

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // --- POST PROCESSING (BLOOM) ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.6, 0.1);
        composer.addPass(bloomPass);

        // --- CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 60;

        // --- SHADER UNIFORMS ---
        const uniforms = {
            uTime: { value: 0.0 },
            uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uCameraPos: { value: new THREE.Vector3() },
            uCameraMat: { value: new THREE.Matrix4() },
            uFov: { value: 55.0 }
        };

        // --- GLSL SHADER DEFINITIONS ---
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            precision highp float;
            
            varying vec2 vUv;
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec3 uCameraPos;
            uniform mat4 uCameraMat;
            uniform float uFov;

            // Constants
            #define STEPS 300          // Raymarching steps
            #define BH_RS 1.0          // Schwarzschild Radius (Event Horizon)
            #define DISK_INNER 2.0     // Inner stable orbit of accretion disk
            #define DISK_OUTER 10.0    // Outer radius of accretion disk
            #define DISK_THICKNESS 0.4 // Vertical thickness of the disk

            // --- NOISE & FRACTAL FUNCTIONS ---
            // Hash function for procedural noise
            float hash(vec3 p) {
                p = fract(p * 0.3183099 + 0.1);
                p *= 17.0;
                return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
            }

            // 3D Value noise
            float noise(vec3 x) {
                vec3 i = floor(x);
                vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                return mix(mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
                               mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                           mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                               mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
            }

            // Fractal Brownian Motion for turbulent plasma texture
            float fbm(vec3 p) {
                float v = 0.0;
                float a = 0.5;
                for (int i = 0; i < 5; i++) {
                    v += a * noise(p);
                    p *= 2.1;
                    a *= 0.5;
                }
                return v;
            }

            // --- PROCEDURAL STARFIELD ---
            vec3 starfield(vec3 dir) {
                vec3 col = vec3(0.0);
                // Layer 1: Distant background stars
                vec3 p = dir * 250.0;
                vec3 id = floor(p);
                float h = hash(id);
                if (h > 0.98) {
                    float d = length(fract(p) - 0.5);
                    float brightness = (h - 0.98) * 60.0;
                    col += smoothstep(0.1, 0.0, d) * brightness * vec3(0.8, 0.9, 1.0);
                }
                // Layer 2: Closer, colorful nebula dust
                float n = fbm(dir * 5.0 + uTime * 0.01);
                col += vec3(0.1, 0.03, 0.2) * pow(n, 3.0) * 0.4;
                return col;
            }

            void main() {
                // Calculate screen UV with aspect ratio correction
                vec2 uv = (vUv - 0.5) * 2.0;
                uv.x *= uResolution.x / uResolution.y;

                // Set up camera ray
                float fovTan = tan(radians(uFov) * 0.5);
                // uCameraMat includes translation, but by putting w=0.0, we extract just the rotation/direction
                vec3 rayDir = normalize((uCameraMat * vec4(uv * fovTan, -1.0, 0.0)).xyz);
                vec3 pos = uCameraPos;

                // Conserved angular momentum (h = |r x v|) for the light ray.
                // In Schwarzschild metric, this remains constant.
                float h2 = pow(length(cross(pos, rayDir)), 2.0);

                vec3 color = vec3(0.0);
                float transmittance = 1.0; // Used for volumetric disk compositing

                // --- RAYMARCHING THROUGH CURVED SPACETIME ---
                for (int i = 0; i < STEPS; i++) {
                    float r2 = dot(pos, pos);
                    float r = sqrt(r2);

                    // 1. Event Horizon Check
                    if (r < BH_RS) {
                        break; // Ray fell into the black hole
                    }
                    
                    // 2. Escape Check
                    if (r > 60.0) {
                        color += starfield(rayDir) * transmittance;
                        break; // Ray escaped to infinity
                    }

                    // 3. Adaptive Step Size
                    // Smaller steps near the BH to resolve photon sphere and disk accurately
                    float dt = clamp(0.05 * r, 0.02, 0.5);

                    // 4. Gravitational Lensing (Schwarzschild Geodesic Approximation)
                    // The light ray's acceleration is proportional to -1.5 * Rs * h^2 * r / r^5
                    // This bends the ray towards the singularity.
                    vec3 accel = -1.5 * BH_RS * h2 * pos / pow(r2, 2.5);
                    rayDir += accel * dt;
                    rayDir = normalize(rayDir); // Maintain speed of light

                    vec3 nextPos = pos + rayDir * dt;

                    // 5. Volumetric Accretion Disk Intersection
                    // Check if we are within the disk's vertical bounds and radial bounds
                    if (abs(pos.y) < DISK_THICKNESS && r > DISK_INNER && r < DISK_OUTER) {
                        // Calculate orbital mechanics for the disk at this radius
                        float orbitSpeed = sqrt(1.0 / r); // Keplerian-ish orbital speed
                        float phi = atan(pos.z, pos.x);
                        
                        // Rotate over time to simulate continuous spin
                        float animPhi = phi + uTime * orbitSpeed * 0.5;

                        // Procedural Plasma Noise
                        // We map the noise to polar coordinates so it swirls with the disk
                        vec3 noisePos = vec3(cos(animPhi) * r, sin(animPhi) * r, uTime * 0.05);
                        float n = fbm(noisePos * 1.5);
                        n = pow(n, 1.5); // Sharpen contrast
                        
                        // High frequency detail
                        float detail = fbm(noisePos * 5.0) * 0.2;
                        n += detail;

                        // Disk density profile
                        float yFalloff = 1.0 - abs(pos.y) / DISK_THICKNESS;
                        yFalloff = pow(yFalloff, 2.0); // Concentrate towards center plane

                        float radialFalloff = smoothstep(DISK_INNER, DISK_INNER + 0.5, r) * (1.0 - smoothstep(DISK_OUTER - 3.0, DISK_OUTER, r));
                        float density = n * yFalloff * radialFalloff * 0.4;

                        if (density > 0.01) {
                            // --- RELATIVISTIC DOPPLER BEAMING ---
                            // Velocity vector (tangent to orbit). crossPos = (x,0,z) -> vel = (-z,0,x)
                            vec3 vel = normalize(vec3(-pos.z, 0.0, pos.x)) * orbitSpeed;
                            
                            // beta = velocity dot direction_to_camera
                            // rayDir is FROM camera TO disk. So direction to camera is -rayDir.
                            float beta = dot(vel, -rayDir);
                            
                            // Relativistic Doppler Factor: D = sqrt(1 - b^2) / (1 - b * cos(theta))
                            float doppler = sqrt(1.0 - orbitSpeed * orbitSpeed) / (1.0 - beta);

                            // Color Shifts: blueshift for approaching, redshift for receding
                            vec3 blueShift = vec3(0.4, 0.6, 1.0);
                            vec3 redShift = vec3(1.0, 0.2, 0.1);
                            vec3 shift = mix(redShift, blueShift, smoothstep(0.5, 2.5, doppler));

                            // Base disk color (hot inner, cooler outer)
                            vec3 baseCol = mix(vec3(1.0, 0.4, 0.1), vec3(1.0, 0.8, 0.5), n);
                            baseCol = mix(baseCol, shift, 0.7); // Apply relativistic color shift

                            // Relativistic Intensity Beaming: I ~ D^3 or D^4
                            float intensity = pow(clamp(doppler, 0.2, 3.0), 3.0);
                            
                            // Inner edge glow (Einstein ring precursor)
                            float innerGlow = smoothstep(DISK_INNER + 1.5, DISK_INNER, r) * 2.0;
                            
                            vec3 emission = baseCol * intensity * (3.0 + innerGlow);
                            
                            // Volumetric compositing (front-to-back accumulation)
                            color += emission * density * transmittance;
                            transmittance *= (1.0 - density);
                        }
                    }
                    pos = nextPos;
                }

                // Fallback if loop finishes without escaping or falling in
                if (transmittance > 0.0 && length(pos) > BH_RS) {
                    color += starfield(rayDir) * transmittance;
                }

                // Faint background ambient light
                color += vec3(0.005, 0.005, 0.01) * transmittance;

                // Vignette for cinematic framing
                vec2 uvVig = vUv - 0.5;
                float vignette = 1.0 - dot(uvVig, uvVig) * 0.8;
                color *= vignette;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // --- FULLSCREEN QUAD SETUP ---
        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader
        });
        const quad = new THREE.Mesh(geometry, material);
        scene.add(quad);

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = clock.getElapsedTime();
            uniforms.uTime.value = elapsed;

            // Update camera matrices for the shader
            controls.update();
            camera.updateMatrixWorld();
            
            uniforms.uCameraPos.value.copy(camera.position);
            uniforms.uCameraMat.value.copy(camera.matrixWorld);

            // Render through the composer for bloom effects
            composer.render();
        }

        // --- RESPONSIVE RESIZE HANDLING ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
